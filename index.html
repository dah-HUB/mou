<!DOCTYPE html>
<html lang="fr" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAFTAL – Satisfaction</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="mou/favicon.ico">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#efefed;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:1.5rem 1rem}
.page{width:100%;max-width:480px;padding-bottom:2rem}

/* HEADER */
.header{text-align:center;margin-bottom:1.25rem;animation:slideDown 0.5s ease}
.naftal-logo{display:inline-flex;flex-direction:column;align-items:center;gap:6px}
.logo-img-wrap{width:76px;height:76px;border-radius:16px;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,0.15)}
.logo-img-wrap img{width:100%;height:100%;object-fit:cover}
.brand-name{font-family:'DM Serif Display',serif;font-size:20px;color:#1a2e1f;margin-top:4px}
.brand-sub{font-size:11px;color:#4a5e4f}

/* CARD */
.card{background:#f7f7f5;border-radius:20px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.09);border:1px solid #e2e2de}
.card-header{background:linear-gradient(135deg,#006B3C,#00a05a);padding:1rem 1.25rem;display:flex;align-items:center;gap:10px}
.station-pulse{width:9px;height:9px;border-radius:50%;background:#4ade80;flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(74,222,128,0.5)}70%{box-shadow:0 0 0 7px rgba(74,222,128,0)}100%{box-shadow:0 0 0 0 rgba(74,222,128,0)}}
.station-label{font-size:10px;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:0.7px}
.station-name{font-size:14px;color:white;font-weight:600}
.card-body{padding:1.5rem 1.25rem}

/* LANGUAGE SCREEN */
.lang-screen{text-align:center;padding:0.5rem 0 0.25rem}
.lang-title{font-family:'DM Serif Display',serif;font-size:17px;color:#1a2e1f;margin-bottom:1.25rem;line-height:1.4}
.lang-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:0}
.lang-btn{display:flex;flex-direction:column;align-items:center;gap:8px;padding:18px 8px;border-radius:14px;border:2px solid #ddddd8;background:#fff;cursor:pointer;transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);font-family:'DM Sans',sans-serif}
.lang-btn:hover{border-color:#006B3C;background:#f0faf5;transform:translateY(-2px)}
.lang-flag{font-size:30px;line-height:1}
.lang-name{font-size:12px;font-weight:600;color:#374151}
.lang-native{font-size:11px;color:#888}

/* SURVEY SCREEN */
.question{font-family:'DM Serif Display',serif;font-size:17px;color:#1a2e1f;line-height:1.4;margin-bottom:1.25rem}
.faces{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:1.25rem}
.face-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 4px;border-radius:14px;border:2px solid #ddddd8;cursor:pointer;background:#fff;transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1)}
.face-btn:hover{transform:translateY(-2px);border-color:#bbb}
.face-btn .emoji{font-size:28px;line-height:1;transition:transform 0.2s}
.face-btn:hover .emoji{transform:scale(1.12)}
.face-btn .flabel{font-size:9px;color:#888;text-align:center;line-height:1.2;font-weight:500}
.face-btn.bad-active{border-color:#ef4444;background:#fff8f8}
.face-btn.bad-active .flabel{color:#ef4444}
.face-btn.good-active{border-color:#006B3C;background:#f0faf5}
.face-btn.good-active .flabel{color:#006B3C}

@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.section-title{font-size:12px;font-weight:600;color:#374151;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.section-title::before{content:'';display:inline-block;width:3px;height:12px;background:#ef4444;border-radius:2px}

.reasons-grid{display:flex;flex-direction:column;gap:5px;margin-bottom:1.25rem}
.reason-chip{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:11px;border:1.5px solid #ddddd8;cursor:pointer;background:#fff;transition:all 0.15s;text-align:left;width:100%;font-family:'DM Sans',sans-serif}
.reason-chip:hover{border-color:#fca5a5;background:#fff8f8}
.reason-chip.chosen{border-color:#ef4444;background:#fff5f5}
.reason-chip .chip-icon{font-size:16px;flex-shrink:0}
.reason-chip .chip-text{font-size:12px;color:#374151;line-height:1.3;flex:1}
.reason-chip.chosen .chip-text{color:#dc2626;font-weight:500}
.reason-chip .chip-check{margin-left:auto;width:18px;height:18px;border-radius:50%;border:1.5px solid #ddd;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:transparent;transition:all 0.15s}
.reason-chip.chosen .chip-check{background:#ef4444;border-color:#ef4444;color:white}

.other-wrap{margin-bottom:1.25rem;animation:fadeSlide 0.25s ease}
.other-wrap input{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid #ddddd8;font-size:13px;font-family:'DM Sans',sans-serif;color:#1a1a1a;outline:none;background:#fff}
.other-wrap input:focus{border-color:#ef4444}

.contact-section{margin-bottom:1.25rem;animation:fadeSlide 0.3s ease}
.contact-q{font-size:13px;font-weight:600;color:#374151;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.contact-q::before{content:'';display:inline-block;width:3px;height:12px;background:#006B3C;border-radius:2px}
.contact-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.toggle-btn{padding:9px;border-radius:10px;border:1.5px solid #ddddd8;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#6b7280;transition:all 0.15s;font-family:'DM Sans',sans-serif}
.toggle-btn.yes-active{border-color:#006B3C;background:#f0faf5;color:#006B3C}
.toggle-btn.no-active{border-color:#9ca3af;background:#f9fafb;color:#6b7280}
.phone-wrap input{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid #ddddd8;font-size:14px;font-family:'DM Sans',sans-serif;color:#1a1a1a;outline:none;background:#fff}
.phone-wrap input:focus{border-color:#006B3C}

.divider{height:1px;background:#e5e5e1;margin:1.1rem 0}
.comment-label{font-size:12px;font-weight:600;color:#374151;margin-bottom:6px}
textarea{width:100%;min-height:72px;resize:none;font-size:13px;font-family:'DM Sans',sans-serif;padding:10px 12px;border-radius:10px;border:1.5px solid #ddddd8;background:#fff;color:#1a1a1a;outline:none;line-height:1.5}
textarea:focus{border-color:#006B3C}
textarea::placeholder{color:#b0b0b0}
.submit-btn{margin-top:1.1rem;width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,#006B3C,#00a05a);color:white;font-size:15px;font-weight:600;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity 0.15s,transform 0.15s}
.submit-btn:hover:not(:disabled){opacity:0.9;transform:translateY(-1px)}
.submit-btn:disabled{opacity:0.38;cursor:not-allowed}

/* THANK YOU */
.thank-you{text-align:center;padding:2rem 1.25rem;display:none;animation:fadeSlide 0.4s ease}
.check-circle{width:68px;height:68px;background:linear-gradient(135deg,#006B3C,#00a05a);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.1rem;font-size:30px}
.thank-you h2{font-family:'DM Serif Display',serif;font-size:21px;color:#1a2e1f;margin-bottom:0.4rem}
.thank-you p{font-size:13px;color:#6b7280;line-height:1.7;margin-bottom:1.25rem}
.new-btn{padding:11px 26px;border-radius:11px;background:#006B3C;color:white;font-size:14px;font-weight:600;border:none;cursor:pointer;font-family:'DM Sans',sans-serif}
.new-btn:hover{opacity:0.88}

.spinner{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,0.4);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:-3px;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* RTL support */
[dir="rtl"] .section-title::before,[dir="rtl"] .contact-q::before{order:1}
[dir="rtl"] .reason-chip .chip-check{margin-left:0;margin-right:auto}
[dir="rtl"] .resp-time{margin-left:0;margin-right:auto}
</style>
</head>

            <button class="reason-chip" onclick="toggleReason(this)" data-key="r5"><span class="chip-icon">💰</span><span class="chip-text" id="r5-text"></span><span class="chip-check">✓</span></button>
            <button class="reason-chip" onclick="toggleReason(this)" data-key="r6"><span class="chip-icon">🚗</span><span class="chip-text" id="r6-text"></span><span class="chip-check">✓</span></button>
            <button class="reason-chip" id="other-chip" onclick="toggleReason(this)" data-key="r7"><span class="chip-icon">❓</span><span class="chip-text" id="r7-text"></span><span class="chip-check">✓</span></button>
          </div>
          <div id="other-wrap" class="other-wrap" style="display:none">
            <input type="text" id="other-text" maxlength="200">
          </div>

          <div class="contact-section">
            <div class="contact-q" id="lbl-contact-q"></div>
            <div class="contact-toggle">
              <button class="toggle-btn" id="yes-btn" onclick="setContact(true)" id="lbl-yes"></button>
              <button class="toggle-btn" id="no-btn" onclick="setContact(false)" id="lbl-no"></button>
            </div>
            <div id="phone-wrap" class="phone-wrap" style="display:none">
              <input type="tel" id="phone" maxlength="20">
            </div>
          </div>
        </div>

        <div class="divider"></div>
        <div class="comment-label" id="lbl-comment"></div>
        <textarea id="comment" maxlength="500"></textarea>
        <button class="submit-btn" id="submit-btn" disabled onclick="submitSurvey()" id="lbl-submit"></button>
      </div>

      <!-- THANK YOU -->
      <div class="thank-you" id="thank-you">
        <div class="check-circle">✅</div>
        <h2 id="ty-title"></h2>
        <p id="ty-body"></p>
        <button class="new-btn" onclick="resetForm()" id="lbl-newsurvey"></button>
      </div>

    </div>
  </div>
</div>

<script>
const FIREBASE_PROJECT = 'naftal-survey';
const STATION_ID = 'station-loisirs';
let selectedRating = null, wantsContact = null, currentLang = 'fr';

const T = {
  fr: {
    stationLabel:'Station active',
    question:"Comment évaluez-vous votre expérience dans cette station ?",
    v1:'Très\ninsatisfait', v2:'Insatisfait', v4:'Satisfait', v5:'Très\nsatisfait',
    reasonsTitle:'Motif(s) de votre insatisfaction',
    r1:'Accueil / comportement du personnel',
    r2:"Temps d'attente / lenteur du service",
    r3:'Propreté de la station',
    r4:'État des équipements / station dégradée',
    r5:'Problème de paiement / caisse',
    r6:'Organisation / circulation',
    r7:'Autre (précisez)',
    otherPlaceholder:'Précisez votre motif…',
    contactQ:'Souhaitez-vous être contacté ?',
    yes:'✅ Oui', no:'❌ Non',
    phonePlaceholder:'Votre numéro de téléphone…',
    commentLabel:'Commentaire (optionnel)',
    commentPlaceholder:'Partagez votre expérience…',
    submit:'Envoyer mon avis',
    sending:'Envoi en cours…',
    tyTitle:'Merci pour votre retour !',
    tyBody:"Votre avis a bien été enregistré.\nNAFTAL s'engage à améliorer continuellement\nla qualité de ses services.",
    newSurvey:'Nouveau questionnaire',
    dir:'ltr'
  },
  ar: {
    stationLabel:'المحطة النشطة',
    question:'كيف تقيّم تجربتك في هذه المحطة؟',
    v1:'غير راضٍ\nإطلاقاً', v2:'غير راضٍ', v4:'راضٍ', v5:'راضٍ\nجداً',
    reasonsTitle:'سبب عدم رضاك',
    r1:'الاستقبال / سلوك الموظفين',
    r2:'وقت الانتظار / بطء الخدمة',
    r3:'نظافة المحطة',
    r4:'حالة المعدات / تدهور المحطة',
    r5:'مشكلة في الدفع / الصندوق',
    r6:'التنظيم / حركة المرور',
    r7:'أخرى (حدد)',
    otherPlaceholder:'حدد سببك…',
    contactQ:'هل تريد أن يتم الاتصال بك؟',
    yes:'✅ نعم', no:'❌ لا',
    phonePlaceholder:'رقم هاتفك…',
    commentLabel:'تعليق (اختياري)',
    commentPlaceholder:'شاركنا تجربتك…',
    submit:'إرسال رأيي',
    sending:'جارٍ الإرسال…',
    tyTitle:'شكراً لك!',
    tyBody:'تم تسجيل رأيك بنجاح.\nنافطال ملتزمة بتحسين جودة خدماتها باستمرار.',
    newSurvey:'استبيان جديد',
    dir:'rtl'
  },
  en: {
    stationLabel:'Active station',
    question:'How do you rate your experience at this station?',
    v1:'Very\ndissatisfied', v2:'Dissatisfied', v4:'Satisfied', v5:'Very\nsatisfied',
    reasonsTitle:'Reason(s) for your dissatisfaction',
    r1:'Reception / staff behaviour',
    r2:'Waiting time / slow service',
    r3:'Station cleanliness',
    r4:'Equipment condition / degraded station',
    r5:'Payment / cashier issue',
    r6:'Organisation / traffic flow',
    r7:'Other (specify)',
    otherPlaceholder:'Specify your reason…',
    contactQ:'Would you like to be contacted?',
    yes:'✅ Yes', no:'❌ No',
    phonePlaceholder:'Your phone number…',
    commentLabel:'Comment (optional)',
    commentPlaceholder:'Share your experience…',
    submit:'Submit my feedback',
    sending:'Sending…',
    tyTitle:'Thank you for your feedback!',
    tyBody:'Your response has been recorded.\nNAFTAL is committed to continuously\nimproving its service quality.',
    newSurvey:'New survey',
    dir:'ltr'
  }
};

function setLang(lang) {
  currentLang = lang;
  const t = T[lang];
  document.getElementById('html-root').lang = lang;
  document.getElementById('survey-form').dir = t.dir;
  document.getElementById('lbl-station').textContent = t.stationLabel;
  document.getElementById('survey-question').textContent = t.question;
  document.getElementById('lbl-v1').textContent = t.v1;
  document.getElementById('lbl-v2').textContent = t.v2;
  document.getElementById('lbl-v4').textContent = t.v4;
  document.getElementById('lbl-v5').textContent = t.v5;
  document.getElementById('lbl-reasons-title').textContent = t.reasonsTitle;
  ['r1','r2','r3','r4','r5','r6','r7'].forEach(k => {
    document.getElementById(k+'-text').textContent = t[k];
  });
  document.getElementById('other-text').placeholder = t.otherPlaceholder;
  document.getElementById('lbl-contact-q').textContent = t.contactQ;
  document.getElementById('yes-btn').textContent = t.yes;
  document.getElementById('no-btn').textContent = t.no;
  document.getElementById('phone').placeholder = t.phonePlaceholder;
  document.getElementById('lbl-comment').textContent = t.commentLabel;
  document.getElementById('comment').placeholder = t.commentPlaceholder;
  document.getElementById('submit-btn').textContent = t.submit;
  document.getElementById('ty-title').textContent = t.tyTitle;
  document.getElementById('ty-body').textContent = t.tyBody;
  document.getElementById('lbl-newsurvey').textContent = t.newSurvey;
  document.getElementById('lang-screen').style.display = 'none';
  document.getElementById('survey-form').style.display = 'block';
}

function selectFace(btn) {
  document.querySelectorAll('.face-btn').forEach(b => b.classList.remove('bad-active','good-active'));
  const type = btn.dataset.type;
  btn.classList.add(type === 'bad' ? 'bad-active' : 'good-active');
  selectedRating = parseInt(btn.dataset.val);
  document.getElementById('submit-btn').disabled = false;
  const s = document.getElementById('bad-section');
  if (type === 'bad') { s.style.display = 'block'; s.style.animation = 'fadeSlide 0.3s ease'; }
  else {
    s.style.display = 'none';
    document.querySelectorAll('.reason-chip').forEach(c => c.classList.remove('chosen'));
    document.getElementById('other-wrap').style.display = 'none';
    document.getElementById('phone-wrap').style.display = 'none';
    document.getElementById('yes-btn').className = 'toggle-btn';
    document.getElementById('no-btn').className = 'toggle-btn';
    wantsContact = null;
  }
}

function toggleReason(chip) {
  chip.classList.toggle('chosen');
  if (chip.id === 'other-chip') {
    document.getElementById('other-wrap').style.display = chip.classList.contains('chosen') ? 'block' : 'none';
    if (!chip.classList.contains('chosen')) document.getElementById('other-text').value = '';
  }
}

function setContact(val) {
  wantsContact = val;
  document.getElementById('yes-btn').className = 'toggle-btn' + (val ? ' yes-active' : '');
  document.getElementById('no-btn').className = 'toggle-btn' + (!val ? ' no-active' : '');
  document.getElementById('phone-wrap').style.display = val ? 'block' : 'none';
  if (!val) document.getElementById('phone').value = '';
}

async function submitSurvey() {
  const btn = document.getElementById('submit-btn');
  const t = T[currentLang];
  const comment = document.getElementById('comment').value.trim();
  const reasons = [];
  document.querySelectorAll('.reason-chip.chosen').forEach(c => {
    const key = c.dataset.key;
    if (key === 'r7') {
      const txt = document.getElementById('other-text').value.trim();
      reasons.push(txt ? t.r7.replace('(précisez)','').replace('(specify)','').replace('(حدد)','').trim() + ': ' + txt : t.r7);
    } else reasons.push(t[key]);
  });
  const phone = document.getElementById('phone').value.trim();
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>' + t.sending;
  try {
    const url = `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT}/databases/(default)/documents/surveys`;
    const fields = {
      rating: { integerValue: selectedRating },
      comment: { stringValue: comment || '' },
      station_id: { stringValue: STATION_ID },
      lang: { stringValue: currentLang },
      timestamp: { stringValue: new Date().toISOString() },
      reasons: { arrayValue: { values: reasons.map(r => ({ stringValue: r })) } },
      wants_contact: { booleanValue: wantsContact === true },
      phone: { stringValue: phone || '' }
    };
    const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ fields }) });
    if (!res.ok) throw new Error('Firestore ' + res.status);
    document.getElementById('survey-form').style.display = 'none';
    document.getElementById('thank-you').style.display = 'block';
  } catch(e) {
    btn.disabled = false;
    btn.textContent = t.submit;
    alert('Erreur / Error: ' + e.message);
  }
}

function resetForm() {
  selectedRating = null; wantsContact = null;
  document.querySelectorAll('.face-btn').forEach(b => b.classList.remove('bad-active','good-active'));
  document.querySelectorAll('.reason-chip').forEach(c => c.classList.remove('chosen'));
  document.getElementById('bad-section').style.display = 'none';
  document.getElementById('other-wrap').style.display = 'none';
  document.getElementById('other-text').value = '';
  document.getElementById('phone-wrap').style.display = 'none';
  document.getElementById('phone').value = '';
  document.getElementById('yes-btn').className = 'toggle-btn';
  document.getElementById('no-btn').className = 'toggle-btn';
  document.getElementById('comment').value = '';
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('submit-btn').textContent = T[currentLang].submit;
  document.getElementById('thank-you').style.display = 'none';
  document.getElementById('lang-screen').style.display = 'block';
  document.getElementById('survey-form').style.display = 'none';
}
</script>
</body>
</html>
